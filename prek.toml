[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "check-added-large-files" },
    { id = "debug-statements" },
]

[[repos]]
hooks = [{
    id = "ruff-check",
    name = "ruff check",
    language = "system",
    entry = "uv run ruff check",
    files = "\\.py$",
  },
  {
    id = "ruff-format",
    name = "ruff format",
    language = "system",
    entry = "uv run ruff format",
    files = "\\.py$",
  },
  {
    id = "ty-check",
    name = "ty check",
    language = "system",
    entry = "uv run ty",
    files = "\\.py$",
  }]
repo = "local"
